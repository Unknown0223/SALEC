services:
  postgres:
    image: postgres:16
    container_name: savdo_postgres
    environment:
      POSTGRES_DB: savdo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "0223"
    # Host port: 5433 ba'zi Windows qurilmalarida «forbidden by access permissions» beradi (Hyper-V excluded range).
    # DATABASE_URL dagi port bilan mos kelishi kerak, masalan: ...@localhost:15432/...
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d savdo_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      # Loyiha ildizidagi SALES/postgres-data (infrastructure dan ../SALES)
      - ../SALES/postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: savdo_redis
    # Ba'zi Windows qurilmalarida 6379 Hyper-V excluded range ichida bo'lib,
    # `bind: An attempt was made to access a socket in a way forbidden...` beradi.
    # Host portni 16479 ga ko'chiring va `REDIS_URL` ni `redis://127.0.0.1:16479` qiling.
    ports:
      - "16479:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

volumes:
  redis_data:
